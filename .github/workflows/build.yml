name: Build Mod From Zip
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Unzip MDK Project
      run: |
        unzip mdk-f1.16.5-main.zip
        mv mdk-f1.16.5-main/* .
        chmod +x gradlew
        
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        
    - name: Build with Gradle
      run: ./gradlew build
      
    - name: Upload Mod Jar
      uses: actions/upload-artifact@v3
      with:
        name: IndustrialMod-Jar
        path: build/libs/*.jar
